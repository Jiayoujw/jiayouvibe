name: Build and push to deploy branch

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify build
        run: |
          echo "=== index.html ==="
          cat dist/index.html
          echo ""
          grep -c './' dist/index.html && echo "✅ Relative paths" || echo "❌ Absolute!"

      - name: Deploy to deploy branch
        run: |
          # Copy dist contents to a temp folder
          cp -r dist /tmp/dist-deploy

          # Create deploy branch with only dist contents
          cd /tmp/dist-deploy
          git init
          git checkout -b deploy
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Deploy $(date +%Y-%m-%d-%H%M)"

          # Force push to deploy branch
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Jiayoujw/jiayouvibe.git" deploy
