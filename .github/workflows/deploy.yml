name: Auto Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: public_html/

      - name: Update deploy branch (backup)
        run: |
          cp -r dist /tmp/d
          cd /tmp/d
          git init && git checkout -b deploy
          git config user.name "bot" && git config user.email "bot@jv.com"
          git add . && git commit -m "deploy"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Jiayoujw/jiayouvibe.git" deploy
