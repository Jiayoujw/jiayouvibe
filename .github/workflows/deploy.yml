name: Deploy to Namecheap

on:
  push:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify build
        run: |
          grep -c './' dist/index.html && echo "✅ Relative paths" || echo "❌ Absolute paths"
          head -2 dist/index.html

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy to Namecheap
        run: |
          # Create test marker file
          echo "TEST_MARKER_NEW" > dist/test_marker.html

          lftp -e "
            set ftp:ssl-allow no;
            set ssl:verify-certificate no;
            open ${{ secrets.FTP_SERVER }};
            user ${{ secrets.FTP_USERNAME }} ${{ secrets.FTP_PASSWORD }};

            # Upload to root
            mirror -R -v --delete ./dist/ ./;
            echo '=== Root ===';
            ls index.html test_marker.html 2>/dev/null;

            # Upload to public_html
            mkdir -p ./public_html;
            mirror -R -v --delete ./dist/ ./public_html/;
            echo '=== public_html ===';
            ls public_html/index.html public_html/test_marker.html 2>/dev/null;

            bye;
          "

      - name: Purge Cloudflare cache
        run: |
          ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=jiayouvibe.com" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')
          echo "Zone ID: $ZONE_ID"
          if [ -n "$ZONE_ID" ] && [ "$ZONE_ID" != "null" ]; then
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}'
          fi
