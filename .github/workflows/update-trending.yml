name: Update GitHub Trending Data

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch GitHub Trending
        run: |
          # Fetch AI repos sorted by stars
          curl -s -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/search/repositories?q=stars:>50+ai+OR+llm+OR+agent+OR+rag&sort=stars&order=desc&per_page=50" \
            > /tmp/trending.json

          # Extract items and write to data file
          node -e "
            const data = require('/tmp/trending.json');
            const repos = (data.items || []).map(r => ({
              id: r.id,
              name: r.name,
              fullName: r.full_name,
              owner: r.owner.login,
              ownerAvatar: r.owner.avatar_url,
              description: r.description || '',
              url: r.html_url,
              stars: r.stargazers_count,
              forks: r.forks_count,
              language: r.language || '',
              topics: r.topics || [],
              updatedAt: r.updated_at
            }));
            require('fs').writeFileSync(
              'src/data/trending-live.json',
              JSON.stringify({ data: repos, timestamp: Date.now() }, null, 2)
            );
          "

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add src/data/trending-live.json
          git diff --staged --quiet || git commit -m "Auto: update trending data [skip ci]"
          git push
